<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chart Test - InsightX</title>
    <link rel="stylesheet" href="styles/cursor-style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background: #1e1e1e;
            color: #cccccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #252526;
            border-radius: 8px;
        }
        .test-button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        .test-button:hover {
            background: #1e8ad6;
        }
        #testWorkspace {
            min-height: 400px;
            margin-top: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #1e4620;
            color: #4caf50;
        }
        .status.error {
            background: #4a1e1e;
            color: #f44336;
        }
    </style>
</head>
<body>
    <h1>InsightX Chart System Test</h1>
    
    <div class="test-section">
        <h2>System Check</h2>
        <div id="systemCheck"></div>
    </div>
    
    <div class="test-section">
        <h2>Test Charts</h2>
        <p>Click a button to test chart generation:</p>
        <button class="test-button" onclick="testBarChart()">Test Bar Chart</button>
        <button class="test-button" onclick="testLineChart()">Test Line Chart</button>
        <button class="test-button" onclick="testPieChart()">Test Pie Chart</button>
        <button class="test-button" onclick="testDonutChart()">Test Donut Chart</button>
        <button class="test-button" onclick="testAreaChart()">Test Area Chart</button>
        <button class="test-button" onclick="testHorizontalBar()">Test Horizontal Bar</button>
        <button class="test-button" onclick="clearCharts()">Clear All Charts</button>
    </div>
    
    <div id="testWorkspace"></div>
    
    <script>
        // Create global workspace reference
        const workspaceContent = document.getElementById('testWorkspace');
        
        // System check
        function checkSystem() {
            const checks = [];
            
            if (typeof echarts !== 'undefined') {
                checks.push(`<div class="status success">✓ ECharts loaded (version ${echarts.version})</div>`);
            } else {
                checks.push(`<div class="status error">✗ ECharts NOT loaded</div>`);
            }
            
            document.getElementById('systemCheck').innerHTML = checks.join('');
        }
        
        // Sample data for testing
        const sampleData = [
            { state: 'Maharashtra', amount: 45000, count: 1200 },
            { state: 'Karnataka', amount: 38000, count: 950 },
            { state: 'Tamil Nadu', amount: 35000, count: 890 },
            { state: 'Delhi', amount: 32000, count: 820 },
            { state: 'Gujarat', amount: 28000, count: 750 },
            { state: 'Rajasthan', amount: 25000, count: 680 },
            { state: 'West Bengal', amount: 22000, count: 620 },
            { state: 'Telangana', amount: 20000, count: 580 }
        ];
        
        // Test functions
        function testBarChart() {
            console.log('[TEST] Testing bar chart...');
            try {
                renderEnhancedChart(sampleData, 'vertical_bar', {
                    title: 'Test Bar Chart - Top States by Amount',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Bar chart created successfully');
            } catch (error) {
                console.error('[TEST] Bar chart failed:', error);
                alert('Bar chart failed: ' + error.message);
            }
        }
        
        function testLineChart() {
            console.log('[TEST] Testing line chart...');
            try {
                renderEnhancedChart(sampleData, 'line', {
                    title: 'Test Line Chart - Trend Analysis',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Line chart created successfully');
            } catch (error) {
                console.error('[TEST] Line chart failed:', error);
                alert('Line chart failed: ' + error.message);
            }
        }
        
        function testPieChart() {
            console.log('[TEST] Testing pie chart...');
            try {
                renderEnhancedChart(sampleData, 'pie', {
                    title: 'Test Pie Chart - Full Circle Distribution',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Pie chart created successfully');
            } catch (error) {
                console.error('[TEST] Pie chart failed:', error);
                alert('Pie chart failed: ' + error.message);
            }
        }
        
        function testDonutChart() {
            console.log('[TEST] Testing donut chart...');
            try {
                renderEnhancedChart(sampleData, 'donut', {
                    title: 'Test Donut Chart - Ring Style Distribution',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Donut chart created successfully');
            } catch (error) {
                console.error('[TEST] Donut chart failed:', error);
                alert('Donut chart failed: ' + error.message);
            }
        }
        
        function testAreaChart() {
            console.log('[TEST] Testing area chart...');
            try {
                renderEnhancedChart(sampleData, 'area', {
                    title: 'Test Area Chart - Volume Over Time',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Area chart created successfully');
            } catch (error) {
                console.error('[TEST] Area chart failed:', error);
                alert('Area chart failed: ' + error.message);
            }
        }
        
        function testHorizontalBar() {
            console.log('[TEST] Testing horizontal bar chart...');
            try {
                renderEnhancedChart(sampleData, 'horizontal_bar', {
                    title: 'Test Horizontal Bar - Long Labels',
                    seriesName: 'Transaction Amount'
                });
                console.log('[TEST] Horizontal bar chart created successfully');
            } catch (error) {
                console.error('[TEST] Horizontal bar chart failed:', error);
                alert('Horizontal bar chart failed: ' + error.message);
            }
        }
        
        function clearCharts() {
            workspaceContent.innerHTML = '';
            console.log('[TEST] All charts cleared');
        }
        
        // Run system check on load
        checkSystem();
    </script>
    
    <!-- Load chart enhancement library -->
    <script src="chart-enhancements.js"></script>
    
    <script>
        // Verify after loading
        console.log('[TEST] Chart system loaded');
        console.log('[TEST] renderEnhancedChart available:', typeof renderEnhancedChart !== 'undefined');
        
        if (typeof renderEnhancedChart === 'undefined') {
            document.getElementById('systemCheck').innerHTML += 
                '<div class="status error">✗ renderEnhancedChart function NOT loaded</div>';
        } else {
            document.getElementById('systemCheck').innerHTML += 
                '<div class="status success">✓ renderEnhancedChart function loaded</div>';
        }
    </script>
</body>
</html>
