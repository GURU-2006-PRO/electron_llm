<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Migrate Chat History to Database</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #cccccc;
        }
        .container {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 30px;
        }
        h1 {
            color: #007acc;
            margin-top: 0;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .status.info {
            background: rgba(0, 122, 204, 0.1);
            border: 1px solid #007acc;
        }
        .status.success {
            background: rgba(137, 209, 133, 0.1);
            border: 1px solid #89d185;
        }
        .status.error {
            background: rgba(244, 135, 113, 0.1);
            border: 1px solid #f48771;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #1e8ad6;
        }
        button:disabled {
            background: #3e3e42;
            cursor: not-allowed;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #2d2d30;
            padding: 15px;
            border-radius: 6px;
        }
        .stat-label {
            font-size: 12px;
            color: #858585;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #007acc;
        }
        pre {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Migrate Chat History to Database</h1>
        
        <div class="status info" id="status">
            <strong>Ready to migrate</strong><br>
            This tool will transfer your chat history from browser localStorage to the SQLite database.
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-label">localStorage Queries</div>
                <div class="stat-value" id="localCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Database Queries</div>
                <div class="stat-value" id="dbCount">0</div>
            </div>
        </div>
        
        <div style="margin: 30px 0;">
            <button onclick="checkStatus()">Check Status</button>
            <button onclick="migrateHistory()" id="migrateBtn">Migrate to Database</button>
            <button onclick="clearLocalStorage()" style="background: #f48771;">Clear localStorage</button>
        </div>
        
        <div id="log" style="margin-top: 20px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const API_URL = 'http://localhost:5000';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div style="color: ${type === 'error' ? '#f48771' : type === 'success' ? '#89d185' : '#cccccc'};">[${timestamp}] ${message}</div>`;
        }
        
        async function checkStatus() {
            try {
                // Check localStorage
                const localHistory = JSON.parse(localStorage.getItem('queryHistory') || '[]');
                document.getElementById('localCount').textContent = localHistory.length;
                log(`Found ${localHistory.length} queries in localStorage`);
                
                // Check database
                const response = await axios.get(`${API_URL}/history/stats`);
                if (response.data.status === 'success') {
                    const dbCount = response.data.statistics.total_queries;
                    document.getElementById('dbCount').textContent = dbCount;
                    log(`Found ${dbCount} queries in database`, 'success');
                }
                
                updateStatus('info', 'Status checked successfully');
            } catch (error) {
                log(`Error checking status: ${error.message}`, 'error');
                updateStatus('error', 'Failed to check status. Make sure backend is running.');
            }
        }
        
        async function migrateHistory() {
            const btn = document.getElementById('migrateBtn');
            btn.disabled = true;
            
            try {
                // Get localStorage data
                const localHistory = JSON.parse(localStorage.getItem('queryHistory') || '[]');
                
                if (localHistory.length === 0) {
                    updateStatus('info', 'No queries to migrate');
                    log('No queries found in localStorage', 'info');
                    btn.disabled = false;
                    return;
                }
                
                log(`Starting migration of ${localHistory.length} queries...`);
                updateStatus('info', 'Migrating...');
                
                // Send to backend
                const response = await axios.post(`${API_URL}/history/import`, {
                    history: localHistory
                });
                
                if (response.data.status === 'success') {
                    const count = response.data.imported_count;
                    log(`Successfully migrated ${count} queries!`, 'success');
                    updateStatus('success', `Migration complete! ${count} queries imported to database.`);
                    
                    // Refresh stats
                    await checkStatus();
                } else {
                    throw new Error(response.data.error || 'Migration failed');
                }
                
            } catch (error) {
                log(`Migration failed: ${error.message}`, 'error');
                updateStatus('error', `Migration failed: ${error.message}`);
            } finally {
                btn.disabled = false;
            }
        }
        
        function clearLocalStorage() {
            if (confirm('Are you sure you want to clear localStorage? Make sure you have migrated to database first!')) {
                localStorage.removeItem('queryHistory');
                localStorage.removeItem('bookmarkedQueries');
                log('localStorage cleared', 'success');
                updateStatus('success', 'localStorage cleared. Data is now only in database.');
                checkStatus();
            }
        }
        
        function updateStatus(type, message) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = `<strong>${type === 'success' ? '✅ Success' : type === 'error' ? '❌ Error' : 'ℹ️ Info'}</strong><br>${message}`;
        }
        
        // Auto-check on load
        window.addEventListener('load', () => {
            log('Migration tool loaded');
            checkStatus();
        });
    </script>
</body>
</html>
